{% extends 'global/base.html' %}

{% block title %}
  Dashborad
{% endblock %}

{% block content %}
  <div class="container mt-4">
   
    <div class="row justify-content-center">
      <div class="col-lg-10 mb-4">
        <div class="card h-100">
          <div class="card-header">Gráfico FFT</div>
          <div class="card-body text-center">
            {% if grafico %}
              <img src="data:image/png;base64,{{ grafico }}" class="img-fluid rounded" alt="Gráfico FFT" />
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
